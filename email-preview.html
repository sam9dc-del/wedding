<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Save the Date Email — Preview</title>
<style>
  body { margin: 0; padding: 40px 20px; background: #e8e4de; font-family: Arial, sans-serif; }
  .label { text-align:center; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #999; margin-bottom: 20px; }
</style>
</head>
<body>

<p class="label">Email preview — what guests will receive</p>

<table width="100%" cellpadding="0" cellspacing="0">
  <tr><td align="center">

    <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#6c725b;border-radius:8px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.2);">

      <!-- Photo (cropped to landscape) -->
      <tr>
        <td style="padding:0;line-height:0;">
          <img src="couple2.jpeg" alt="Megan and Sam" width="520"
               style="width:100%;height:280px;object-fit:cover;object-position:center 30%;display:block;" />
        </td>
      </tr>

      <!-- Main -->
      <tr>
        <td style="padding:48px 48px 52px;text-align:center;">

          <!-- Headline -->
          <h1 style="margin:0 0 24px;font-family:Georgia,'Times New Roman',serif;font-size:34px;font-weight:400;color:#fff;line-height:1.2;">
            We're getting married!
          </h1>

          <!-- Personal note (firstName is a placeholder in preview) -->
          <p style="margin:0 0 36px;font-family:Arial,sans-serif;font-size:15px;line-height:1.75;color:rgba(255,255,255,0.78);">
            Hello [First Name],<br/><br/>
            We've set a date for our wedding and we can't wait to share it with you!
          </p>

          <!-- CTA -->
          <a href="https://sam9dc-del.github.io/wedding/save-the-date.html"
             style="display:inline-block;padding:15px 48px;background:#ffffff;color:#575e49;font-family:Arial,sans-serif;font-size:11px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;text-decoration:none;border-radius:40px;">
            Open Envelope
          </a>

        </td>
      </tr>

      <!-- Footer -->
      <tr>
        <td style="background:#575e49;padding:18px 40px;text-align:center;">
          <p style="margin:0;font-family:Arial,sans-serif;font-size:10px;color:rgba(255,255,255,0.42);letter-spacing:0.12em;">
            Megan &amp; Sam &nbsp;·&nbsp; 2027
          </p>
        </td>
      </tr>

    </table>

  </td></tr>
</table>

</body>
</html>
