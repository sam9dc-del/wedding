<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Save the Date Email — Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet"/>
<style>
  @font-face {
    font-family: 'Mozart Script';
    src: url('MozartScript-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
</style>
<style>
  body { margin: 0; padding: 40px 20px; background: #e8e4de; font-family: Arial, sans-serif; }
  .label { text-align:center; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #999; margin-bottom: 20px; }
</style>
</head>
<body>

<p class="label">Email preview — what guests will receive</p>

<table width="100%" cellpadding="0" cellspacing="0">
  <tr><td align="center">

    <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#ffffff;border-radius:4px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.15);">

      <!-- Sage top rule -->
      <tr>
        <td style="background:#6c725b;height:5px;font-size:0;line-height:0;">&nbsp;</td>
      </tr>

      <!-- Photo -->
      <tr>
        <td style="padding:0;line-height:0;">
          <img src="couple2.jpeg" alt="Megan and Sam" width="520"
               style="width:100%;height:340px;object-fit:cover;object-position:center 55%;display:block;" />
        </td>
      </tr>

      <!-- Main content -->
      <tr>
        <td style="padding:72px 48px 48px;text-align:center;">

          <!-- Script headline -->
          <p style="margin:0 0 16px;font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:44px;line-height:1;color:#1a1a1a;">
            We're getting married!
          </p>

          <p style="margin:0 0 32px;font-family:'Jost',Arial,sans-serif;font-weight:300;font-size:10px;letter-spacing:0.32em;text-transform:uppercase;color:#6c725b;">
            Megan &amp; Sam
          </p>

          <!-- Personal note -->
          <p style="margin:0 0 40px;font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:16px;line-height:1.75;color:#555;font-weight:300;">
            Hello [First Name],<br/><br/>
            We've set a date for our wedding and<br/>
            we can't wait to share it with you!
          </p>

          <!-- CTA button -->
          <a href="https://sam9dc-del.github.io/wedding/save-the-date.html"
             style="display:inline-block;padding:14px 44px;background:#6c725b;color:#ffffff;font-family:'Jost',Arial,sans-serif;font-size:10px;font-weight:400;letter-spacing:0.28em;text-transform:uppercase;text-decoration:none;border-radius:40px;">
            View Save The Date
          </a>

        </td>
      </tr>

      <!-- Footer -->
      <tr>
        <td style="padding:20px 40px;text-align:center;border-top:1px solid #ede9e3;">
          <p style="margin:0;font-family:'Jost',Arial,sans-serif;font-size:9px;font-weight:300;letter-spacing:0.28em;text-transform:uppercase;color:#aaa;">
            Megan &amp; Sam &nbsp;·&nbsp; 14 March 2027 &nbsp;·&nbsp; Taupo
          </p>
        </td>
      </tr>

    </table>

  </td></tr>
</table>

</body>
</html>
