<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save the Date — Megan &amp; Sam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Mozart Script';
      src: url('https://sam9dc-del.github.io/wedding/MozartScript-Regular.ttf') format('truetype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: #6c725b;
      background-image: radial-gradient(ellipse at 50% 40%, #7d8469 0%, #505744 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ─── SCENE ─── */
    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.6s ease;
    }
    .scene.fade-out { opacity: 0; pointer-events: none; }

    /* ─── ENVELOPE ─── */
    .envelope {
      position: relative;
      width: min(320px, 78vw);
      cursor: pointer;
      animation: float 4s ease-in-out infinite;
    }
    .envelope.open { animation: none; cursor: default; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* Black envelope body — defines the container height */
    .env-body {
      position: relative;
      width: 100%;
      aspect-ratio: 1.55;
      background: #3d3d3b;
      border-radius: 6px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.25);
      z-index: 2;
    }

    /* White card — just the top edge peeking out */
    .env-card {
      position: absolute;
      left: 4%; right: 4%;
      bottom: 4%;
      height: 130%;
      background: #fff;
      border-radius: 2px;
      z-index: 1;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.15);
      transform: translateY(-10%);
      transition: transform 1s cubic-bezier(0.22, 1.1, 0.36, 1);
    }

    .envelope.open .env-card {
      transform: translateY(-106%);
    }

    /* Tap hint */
    .tap-hint {
      margin-top: 28px;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      animation: pulse 2.8s ease-in-out infinite;
      transition: opacity 0.5s;
    }
    .tap-hint.gone { opacity: 0; pointer-events: none; }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.65; }
    }

    /* ─── CARD REVEAL ─── */
    .std-page {
      position: fixed;
      inset: 0;
      background: transparent;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
      overflow-y: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 5vw, 60px) 20px;
    }
    .std-page.visible {
      opacity: 1;
      pointer-events: all;
    }

    .std-card {
      width: min(480px, 88vw);
      border-radius: 2px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.35), 0 4px 16px rgba(0,0,0,0.15);
      overflow: hidden;
      background: #fff;
      padding: 20px 0;
    }

    .std-card img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>

  <div class="scene" id="scene">
    <div class="envelope" id="envelope" onclick="openEnvelope()">

      <!-- Card behind the envelope body, already peeking out -->
      <div class="env-card"></div>

      <!-- Black envelope body (sits on top, hides lower portion of card) -->
      <div class="env-body"></div>

    </div>
    <p class="tap-hint" id="tap-hint">Tap to open</p>
  </div>

  <!-- Full save the date reveal -->
  <div class="std-page" id="std-page">
    <div class="std-card">
      <img src="std-card.png" alt="Save the Date — Megan Spring &amp; Sam Cook, 14 March 2027" />
    </div>
  </div>

  <script>
    function openEnvelope() {
      const env = document.getElementById('envelope');
      if (env.classList.contains('open')) return;
      env.classList.add('open');
      document.getElementById('tap-hint').classList.add('gone');
      setTimeout(() => {
        document.getElementById('std-page').classList.add('visible');
        setTimeout(() => {
          document.getElementById('scene').classList.add('fade-out');
        }, 400);
      }, 1000);
    }
  </script>

</body>
</html>
